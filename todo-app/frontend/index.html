<!DOCTYPE html>
<html>

<head>

    <title>Todo App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Todo App</h1>

        <form id="todoForm">

            <input
                type="text"
                id="todoInput"
                placeholder="Enter Todo"
                required
            >

            <button type="submit">
                Add Todo
            </button>

        </form>

        <div id="todoList"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
